services:
  steadyview-api:
    build: .
    container_name: steadyview-realapp-v2
    gpus: all
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
