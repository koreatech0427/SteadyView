services:
  steadyview-api:
    build: .
    container_name: steadyview-realapp-v2
    gpus: all
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ${STEADYVIEW_BASICVSRPP_HOST_DIR:-C:/Users/korea/Desktop/BasicVSR++}:/opt/basicvsrpp:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - STEADYVIEW_BASICVSRPP_DIR=/opt/basicvsrpp
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
