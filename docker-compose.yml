services:
  steadyview-api:
    build: .
    container_name: steadyview-realapp-v2
    gpus: all
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ${STEADYVIEW_REAL_ESRGAN_HOST_DIR:-C:/Users/korea/Desktop/Real-ESRGAN/Real-ESRGAN_V2}:/opt/real-esrgan:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - STEADYVIEW_REAL_ESRGAN_DIR=/opt/real-esrgan
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
