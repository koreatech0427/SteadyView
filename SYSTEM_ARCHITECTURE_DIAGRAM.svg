<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .page { fill: #ffffff; stroke: #111827; stroke-width: 3; }
      .title-box { fill: #ffffff; stroke: #111827; stroke-width: 3.5; }
      .card { fill: #ffffff; stroke: #c0c6cf; stroke-width: 2.4; }
      .card-blue { fill: #f7fbff; stroke: #93c5fd; stroke-width: 2.4; }
      .card-green { fill: #f3fcf8; stroke: #86efac; stroke-width: 2.4; }
      .card-red { fill: #fff7f7; stroke: #fca5a5; stroke-width: 2.4; }
      .card-gray { fill: #fbfcfe; stroke: #c0c6cf; stroke-width: 2.4; }
      .group-pipeline { fill: #fffefe; stroke: #ff6b2b; stroke-width: 2.5; stroke-dasharray: 11 8; }
      .group-runtime { fill: #fffefe; stroke: #f59e0b; stroke-width: 2.5; stroke-dasharray: 11 8; }
      .pill-orange { fill: #fff1e8; }
      .pill-amber { fill: #fff7dd; }
      .pill-blue { fill: #eff6ff; }
      .pill-green { fill: #ecfdf5; }
      .txt { font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #111827; }
      .title { font-size: 34px; font-weight: 800; }
      .brand { font-size: 30px; font-weight: 900; letter-spacing: .3px; }
      .subtitle { font-size: 14px; fill: #4b5563; }
      .node-title { font-size: 20px; font-weight: 800; }
      .node-sub { font-size: 13px; fill: #4b5563; }
      .small { font-size: 12px; fill: #4b5563; }
      .label { font-size: 13px; font-weight: 800; }
      .group-label { font-size: 15px; font-weight: 800; fill: #ea580c; }
      .runtime-label { font-size: 15px; font-weight: 800; fill: #b45309; }
      .blue { fill: #2563eb; }
      .green { fill: #059669; }
      .red { fill: #dc2626; }
      .gray { fill: #6b7280; }
      .orange { fill: #ea580c; }
      .shadow { filter: url(#shadow); }
      .icon-blue { fill: none; stroke: #3b82f6; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .icon-green { fill: none; stroke: #10b981; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .icon-indigo { fill: none; stroke: #6366f1; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .icon-orange { fill: none; stroke: #f97316; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .icon-gray { fill: none; stroke: #8b95a1; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .icon-red { fill: none; stroke: #ef4444; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .arrow-blue { stroke: #2f80ed; stroke-width: 3.2; fill: none; marker-end: url(#arrow-blue); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-green { stroke: #10b981; stroke-width: 3.2; fill: none; marker-end: url(#arrow-green); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-red { stroke: #ef4444; stroke-width: 3.2; fill: none; marker-end: url(#arrow-red); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-gray { stroke: #9ca3af; stroke-width: 2.4; fill: none; marker-end: url(#arrow-gray); stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 7 7; }
      .line-blue { stroke: #2f80ed; stroke-width: 3.2; fill: none; stroke-linecap: round; }
      .line-green { stroke: #10b981; stroke-width: 3.2; fill: none; stroke-linecap: round; }
      .line-red { stroke: #ef4444; stroke-width: 3.2; fill: none; stroke-linecap: round; }
      .line-gray { stroke: #9ca3af; stroke-width: 2.4; fill: none; stroke-linecap: round; stroke-dasharray: 7 7; }
    </style>

    <filter id="shadow" x="-10%" y="-15%" width="125%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2f80ed"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#10b981"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="page" x="24" y="24" width="1552" height="852"/>

  <!-- Title -->
  <rect class="title-box shadow" x="56" y="50" width="260" height="62" rx="7"/>
  <text class="txt title" x="186" y="91" text-anchor="middle">시스템 구성도</text>
  <text class="txt brand" x="350" y="89">STEADYVIEW</text>
  <text class="txt subtitle" x="350" y="112">AI 기반 영상 안정화 · 수평 보정 · 초해상화 웹 서비스</text>

  <!-- Top-level flow cards -->
  <g class="shadow">
    <rect class="card" x="78" y="340" width="215" height="92" rx="13"/>
    <rect class="card" x="355" y="340" width="225" height="92" rx="13"/>
    <rect class="card" x="642" y="340" width="250" height="92" rx="13"/>
  </g>

  <!-- Browser card -->
  <circle class="icon-blue" cx="119" cy="386" r="18"/>
  <path class="icon-blue" d="M101 386 H137"/>
  <path class="icon-blue" d="M119 368 C130 380 130 392 119 404"/>
  <path class="icon-blue" d="M119 368 C108 380 108 392 119 404"/>
  <text class="txt node-title" x="156" y="382">브라우저</text>
  <text class="txt node-sub" x="156" y="407">index.html / app.js</text>

  <!-- FastAPI card -->
  <path class="icon-green" d="M399 365 L380 402 H400 L391 421 L425 378 H405 Z"/>
  <text class="txt node-title" x="444" y="382">FastAPI</text>
  <text class="txt node-sub" x="444" y="407">app.py · 요청 검증</text>

  <!-- Processor card -->
  <path class="icon-indigo" d="M684 370 H719"/>
  <path class="icon-indigo" d="M684 386 H719"/>
  <path class="icon-indigo" d="M684 402 H719"/>
  <text class="txt node-title" x="742" y="382">비디오 처리기</text>
  <text class="txt node-sub" x="742" y="407">video_processor.py</text>

  <!-- Flow labels and arrows -->
  <path class="arrow-blue" d="M293 386 H355"/>
  <rect class="pill-blue" x="306" y="358" width="38" height="22" rx="5"/>
  <text class="txt label blue" x="325" y="374" text-anchor="middle">HTTP</text>

  <path class="arrow-green" d="M580 386 H642"/>
  <rect class="pill-green" x="592" y="358" width="38" height="22" rx="5"/>
  <text class="txt label green" x="611" y="374" text-anchor="middle">호출</text>

  <path class="arrow-blue" d="M470 432 V500 H185 V432"/>
  <text class="txt small blue" x="317" y="492" text-anchor="middle">MP4 Preview / Processed MP4 응답</text>

  <!-- FFmpeg conversion below processor -->
  <g class="shadow">
    <rect class="card-red" x="642" y="560" width="250" height="86" rx="13"/>
  </g>
  <rect class="icon-gray" x="679" y="587" width="24" height="34" rx="6"/>
  <rect class="icon-gray" x="710" y="587" width="24" height="34" rx="6"/>
  <text class="txt node-title" x="760" y="595">FFmpeg / FFprobe</text>
  <text class="txt node-sub" x="760" y="620">브라우저 호환 MP4 변환</text>
  <path class="arrow-red" d="M767 432 V560"/>
  <text class="txt small red" x="786" y="512">preview / output 변환</text>

  <!-- Option branch -->
  <g class="shadow">
    <polygon points="948,386 1010,342 1072,386 1010,430" fill="#ffffff" stroke="#c0c6cf" stroke-width="2.4"/>
  </g>
  <text class="txt label" x="1010" y="382" text-anchor="middle">옵션</text>
  <text class="txt label" x="1010" y="402" text-anchor="middle">분기</text>
  <path class="arrow-green" d="M892 386 H948"/>
  <text class="txt small green" x="919" y="371" text-anchor="middle">option</text>

  <!-- Pipeline group -->
  <rect class="group-pipeline" x="1078" y="166" width="292" height="462" rx="18"/>
  <rect class="pill-orange" x="1100" y="184" width="95" height="28" rx="7"/>
  <text class="txt group-label" x="1147" y="204" text-anchor="middle">파이프라인</text>

  <g class="shadow">
    <rect class="card-green" x="1120" y="235" width="210" height="78" rx="12"/>
    <rect class="card-blue" x="1120" y="365" width="210" height="78" rx="12"/>
    <rect class="card-red" x="1120" y="495" width="210" height="78" rx="12"/>
  </g>

  <path class="icon-green" d="M1142 266 C1158 247 1185 252 1191 275 C1196 297 1177 310 1154 304"/>
  <path class="icon-green" d="M1154 304 L1141 304 L1148 291"/>
  <text class="txt node-title" x="1248" y="270" text-anchor="middle">흔들림 보정</text>
  <text class="txt node-sub" x="1248" y="295" text-anchor="middle">Stabilization</text>

  <path class="icon-blue" d="M1144 405 H1192"/>
  <path class="icon-blue" d="M1168 381 V425"/>
  <path class="icon-blue" d="M1150 392 L1162 404 L1184 380"/>
  <text class="txt node-title" x="1248" y="397" text-anchor="middle">수평 + 보정</text>
  <text class="txt node-sub" x="1248" y="422" text-anchor="middle">Upright + Stabilization</text>

  <path class="icon-red" d="M1146 545 L1162 526 L1178 544 L1190 531"/>
  <path class="icon-red" d="M1190 531 V550 H1172"/>
  <text class="txt node-title" x="1248" y="527" text-anchor="middle">초해상화</text>
  <text class="txt node-sub" x="1248" y="552" text-anchor="middle">Superresolution</text>

  <!-- Clean branch arrows -->
  <path class="arrow-green" d="M1072 386 H1098 V274 H1120"/>
  <path class="arrow-green" d="M1072 386 H1120"/>
  <path class="arrow-green" d="M1072 386 H1098 V534 H1120"/>

  <!-- Runtime dependency group -->
  <rect class="group-runtime" x="1360" y="120" width="174" height="552" rx="18"/>
  <rect class="pill-amber" x="1382" y="140" width="86" height="28" rx="7"/>
  <text class="txt runtime-label" x="1425" y="160" text-anchor="middle">실행 환경</text>

  <g class="shadow">
    <rect class="card-gray" x="1382" y="205" width="132" height="82" rx="12"/>
    <rect class="card-gray" x="1382" y="365" width="132" height="82" rx="12"/>
    <rect class="card-gray" x="1382" y="525" width="132" height="82" rx="12"/>
  </g>

  <path class="icon-gray" d="M1407 226 V256"/>
  <path class="icon-gray" d="M1395 233 C1405 233 1407 240 1407 245"/>
  <path class="icon-gray" d="M1419 233 C1409 233 1407 240 1407 245"/>
  <text class="txt label" x="1460" y="254" text-anchor="middle">GPU/CPU</text>
  <text class="txt small" x="1460" y="272" text-anchor="middle">Torch</text>

  <path class="icon-gray" d="M1400 384 C1388 399 1388 415 1400 430"/>
  <path class="icon-gray" d="M1424 384 C1412 399 1412 415 1424 430"/>
  <text class="txt label" x="1460" y="411" text-anchor="middle">Upright</text>
  <text class="txt small" x="1460" y="429" text-anchor="middle">.pth 모델</text>

  <path class="icon-red" d="M1408 546 L1415 562 L1433 564 L1420 575 L1424 593 L1408 584 L1392 593 L1396 575 L1383 564 L1401 562 Z"/>
  <text class="txt label" x="1460" y="577" text-anchor="middle">Real-</text>
  <text class="txt label" x="1460" y="596" text-anchor="middle">ESRGAN</text>

  <!-- Short dependency lines only -->
  <path class="arrow-gray" d="M1330 274 H1382"/>
  <path class="arrow-gray" d="M1330 404 H1382"/>
  <path class="arrow-gray" d="M1330 534 H1382"/>

  <!-- Output node -->
  <g class="shadow">
    <rect class="card" x="1108" y="690" width="235" height="78" rx="13"/>
  </g>
  <text class="txt node-title" x="1226" y="721" text-anchor="middle">처리 완료 MP4</text>
  <text class="txt node-sub" x="1226" y="746" text-anchor="middle">FastAPI 응답으로 반환</text>
  <path class="arrow-green" d="M1225 628 V690"/>

  <!-- Docker / deployment -->
  <g class="shadow">
    <rect class="card-gray" x="82" y="640" width="265" height="86" rx="13"/>
  </g>
  <circle class="icon-gray" cx="124" cy="683" r="16"/>
  <path class="icon-gray" d="M108 683 H140"/>
  <text class="txt node-title" x="164" y="676">Docker / Compose</text>
  <text class="txt node-sub" x="164" y="702">gpus: all · GPU 컨테이너</text>

  <!-- Legend -->
  <g transform="translate(392 680)">
    <text class="txt node-title" x="0" y="0">범례</text>
    <line class="line-blue" x1="0" y1="32" x2="46" y2="32"/>
    <text class="txt label" x="60" y="37">브라우저 ↔ 서버</text>
    <line class="line-green" x1="0" y1="66" x2="46" y2="66"/>
    <text class="txt label" x="60" y="71">처리 흐름</text>
    <line class="line-red" x1="0" y1="100" x2="46" y2="100"/>
    <text class="txt label" x="60" y="105">변환 처리</text>
    <line class="line-gray" x1="0" y1="134" x2="46" y2="134"/>
    <text class="txt label" x="60" y="139">실행 의존성</text>
  </g>
</svg>
